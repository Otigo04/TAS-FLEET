<svg width="360" height="110" viewBox="0 0 360 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gemTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <clipPath id="gemClip">
      <polygon points="50,4 82,28 70,104 30,104 18,28"/>
    </clipPath>
  </defs>

  <!-- Gem facets -->
  <polygon points="50,4 82,28 18,28" fill="url(#gemTop)"/>
  <polygon points="18,28 50,4 50,72" fill="#155e75"/>
  <polygon points="82,28 50,4 50,72" fill="#22d3ee"/>
  <polygon points="18,28 50,72 30,104" fill="#164e63"/>
  <polygon points="82,28 50,72 70,104" fill="#0891b2"/>
  <polygon points="30,104 50,72 70,104" fill="#a5f3fc"/>

  <!-- Silver edge highlights -->
  <polyline points="50,4 18,28 30,104 50,72" fill="none" stroke="#C8D8DC" stroke-width="1" opacity="0.6"/>
  <polyline points="50,4 82,28 70,104 50,72" fill="none" stroke="#C8D8DC" stroke-width="1" opacity="0.6"/>

  <!-- Car icon centered in gem, clipped to gem shape -->
  <g clip-path="url(#gemClip)" opacity="0.92">
    <!-- Car body -->
    <rect x="28" y="56" width="44" height="16" rx="3" fill="#ecfeff"/>
    <!-- Cabin / roof -->
    <path d="M34,56 Q37,44 44,43 L56,43 Q63,44 66,56 Z" fill="#ecfeff"/>
    <!-- Windshield cutout -->
    <path d="M37,56 Q39,48 44,47 L56,47 Q61,48 63,56 Z" fill="#0891b2"/>
    <!-- Left wheel -->
    <circle cx="37" cy="72" r="6" fill="#164e63"/>
    <circle cx="37" cy="72" r="3" fill="#a5f3fc"/>
    <!-- Right wheel -->
    <circle cx="63" cy="72" r="6" fill="#164e63"/>
    <circle cx="63" cy="72" r="3" fill="#a5f3fc"/>
  </g>

  <!-- Dot accents -->
  <circle cx="86" cy="16" r="5" fill="#A8B8C0" opacity="0.8"/>
  <circle cx="95" cy="28" r="3" fill="#a5f3fc" opacity="0.6"/>

  <!-- Divider -->
  <line x1="104" y1="10" x2="104" y2="100" stroke="#A8B8C0" stroke-width="0.8" opacity="0.35"/>

  <!-- TAS wordmark -->
  <text x="118" y="72"
    font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif"
    font-size="62" font-weight="700" letter-spacing="-1.5"
    fill="#f1f5f9">TAS</text>

  <!-- FLEET subline -->
  <text x="120" y="97"
    font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif"
    font-size="17" font-weight="400" letter-spacing="5.5"
    fill="#22d3ee">FLEET</text>
</svg>
